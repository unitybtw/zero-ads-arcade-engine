<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Arcade Test Game</title>
    <style>
        body { margin: 0; background: #1a1a1e; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #player { width: 50px; height: 50px; background: #00e5ff; position: absolute; border-radius: 4px; box-shadow: 0 0 15px #00e5ff; }
        .instructions { position: absolute; top: 20px; font-size: 14px; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="instructions">Use Arrow Keys to Move & Collect Score</div>
    <div id="player" style="left: 175px; top: 125px;"></div>

    <script>
        let score = 0;
        const player = document.getElementById('player');
        let x = 175;
        let y = 125;

        // EngineBridge ile haberleşme fonksiyonu
        function sendToEngine(type, value) {
            window.parent.postMessage({
                source: 'ARCADE_ENGINE_GAME',
                payload: {
                    type: type,
                    value: value,
                    timestamp: Date.now()
                }
            }, '*');
        }

        window.addEventListener('keydown', (e) => {
            const speed = 10;
            if (e.key === 'ArrowUp') y -= speed;
            if (e.key === 'ArrowDown') y += speed;
            if (e.key === 'ArrowLeft') x -= speed;
            if (e.key === 'ArrowRight') x += speed;

            player.style.left = x + 'px';
            player.style.top = y + 'px';

            // Her harekette skor artışı (test amaçlı)
            score += 1;
            sendToEngine('SCORE_UPDATE', score);
        });

        // Başlangıçta hazır mesajı gönder
        sendToEngine('GAME_READY', true);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero-Ads Arcade Engine | Demo</title>
    <style>
        body {
            margin: 0;
            background: #0a0a0c;
            color: #00e5ff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .arcade-container {
            position: relative;
            width: 800px;
            height: 600px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #00e5ff;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.2);
            margin-top: 50px;
            overflow: hidden;
        }
        .hud-top {
            position: absolute;
            top: 10px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            font-family: monospace;
            z-index: 10;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .scanline {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            opacity: 0.15;
        }
    </style>
</head>
<body>
    <div class="hud-top">
        <div>CORE_SYSTEM: ACTIVE</div>
        <div>ENGINE_VER: 1.0.0-BETA</div>
    </div>
    
    <div class="arcade-container">
        <!-- Buraya oyun iframe'i gelecek -->
        <div class="hud-top" id="score-display">SCORE: 00000</div>
        <div class="scanline"></div>
        <iframe src="about:blank" id="game-frame"></iframe>
    </div>

    <script type="module">
        import { EngineBridge } from './src/core/EngineBridge.js';
        const bridge = new EngineBridge('demo-game');
        
        window.addEventListener('arcade:game-over', (e) => {
            alert("GAME OVER! Final Score: " + e.detail.score);
        });
    </script>
</body>
</html>

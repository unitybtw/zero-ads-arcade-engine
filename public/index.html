<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero-Ads Arcade Engine | Demo</title>
    <style>
        body {
            margin: 0;
            background: #0a0a0c;
            color: #00e5ff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .arcade-container {
            position: relative;
            width: 800px;
            height: 600px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #00e5ff;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.2);
            margin-top: 50px;
            overflow: hidden;
        }
        #loading-screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #0a0a0c;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.5s ease;
        }
        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid #FFF;
            border-bottom-color: #00e5ff;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .hud-top {
            position: absolute;
            top: 10px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            font-family: monospace;
            z-index: 10;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .scanline {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            opacity: 0.15;
        }
    </style>
</head>
<body>
    <div class="hud-top">
        <div>CORE_SYSTEM: ACTIVE</div>
        <div>ENGINE_VER: 1.0.0-BETA</div>
    </div>
    
    <div class="arcade-container">
        <div id="loading-screen">
            <span class="loader"></span>
            <p>INITIALIZING ANALYTICS...</p>
        </div>
        <!-- Buraya oyun iframe'i gelecek -->
        <div class="hud-top" id="score-display">SCORE: 00000</div>
        <div class="scanline"></div>
        <iframe src="test-game.html" id="game-frame"></iframe>
    </div>

    <script type="module">
        import { EngineBridge } from './EngineBridge.js';
        const bridge = new EngineBridge('test-game');
        
        window.addEventListener('message', (event) => {
            if (event.data.payload?.type === 'GAME_READY') {
                const loader = document.getElementById('loading-screen');
                if (loader) loader.style.opacity = '0';
                setTimeout(() => loader?.remove(), 500);
            }
        });
    </script>
</body>
</html>
